<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Rounded square background -->
  <rect width="192" height="192" rx="40" fill="#4a6cf7"/>
  <!-- Inner card -->
  <rect x="12" y="12" width="168" height="168" rx="32" fill="#dde7ff"/>

  <!-- Zippy the Parrot — centered, scaled for icon -->

  <!-- Tail feathers -->
  <ellipse cx="76" cy="172" rx="7" ry="18" fill="#ef4444" transform="rotate(-22 76 172)"/>
  <ellipse cx="96" cy="175" rx="7" ry="20" fill="#3b82f6"/>
  <ellipse cx="116" cy="172" rx="7" ry="18" fill="#22c55e" transform="rotate(22 116 172)"/>

  <!-- Body -->
  <ellipse cx="96" cy="130" rx="30" ry="34" fill="#16a34a"/>

  <!-- Left wing -->
  <path d="M66 112 Q44 126 48 152 Q62 158 74 138 Z" fill="#2563eb"/>
  <path d="M66 112 Q50 124 52 146 Q62 150 70 134 Z" fill="#60a5fa"/>

  <!-- Right wing -->
  <path d="M126 112 Q148 126 144 152 Q130 158 118 138 Z" fill="#2563eb"/>
  <path d="M126 112 Q142 124 140 146 Q130 150 122 134 Z" fill="#60a5fa"/>

  <!-- Belly -->
  <ellipse cx="96" cy="136" rx="16" ry="22" fill="#4ade80"/>

  <!-- Head -->
  <circle cx="96" cy="76" r="30" fill="#16a34a"/>

  <!-- Crest feathers -->
  <ellipse cx="87" cy="48" rx="4.5" ry="13" fill="#fbbf24" transform="rotate(-18 87 48)"/>
  <ellipse cx="96" cy="45" rx="4.5" ry="14" fill="#f59e0b"/>
  <ellipse cx="105" cy="48" rx="4.5" ry="13" fill="#fbbf24" transform="rotate(18 105 48)"/>

  <!-- Cheek blush -->
  <circle cx="74" cy="82" r="7" fill="#fca5a5" opacity="0.75"/>
  <circle cx="118" cy="82" r="7" fill="#fca5a5" opacity="0.75"/>

  <!-- Left eye -->
  <circle cx="82" cy="68" r="10" fill="white"/>
  <circle cx="84" cy="70" r="6.5" fill="#0f172a"/>
  <circle cx="86" cy="68" r="2.5" fill="white"/>

  <!-- Right eye -->
  <circle cx="110" cy="68" r="10" fill="white"/>
  <circle cx="112" cy="70" r="6.5" fill="#0f172a"/>
  <circle cx="114" cy="68" r="2.5" fill="white"/>

  <!-- Beak -->
  <path d="M86 88 Q96 80 106 88 Q102 100 96 104 Q90 100 86 88 Z" fill="#f97316"/>
  <path d="M90 96 Q96 101 102 96 Q99 106 96 108 Q93 106 90 96 Z" fill="#ea580c"/>

  <!-- Feet -->
  <g stroke="#f97316" stroke-width="3.5" stroke-linecap="round">
    <line x1="82" y1="162" x2="74" y2="178"/>
    <line x1="82" y1="162" x2="82" y2="180"/>
    <line x1="82" y1="162" x2="90" y2="178"/>
    <line x1="110" y1="162" x2="102" y2="178"/>
    <line x1="110" y1="162" x2="110" y2="180"/>
    <line x1="110" y1="162" x2="118" y2="178"/>
  </g>
</svg>
